inputs:
  nixpkgs:
    url: github:nixos/nixpkgs/nixpkgs-unstable
  # pinned for emscripten 3.1.73 (godot-rust web exports; 4.x breaks the linker)
  nixpkgs-emscripten:
    url: github:nixos/nixpkgs/e255a9090e25aed2486f9fb00e5d645fb342d654
  # tracy 0.12.2 must match bevy's tracy-client
  tracy:
    url: github:allyourcodebase/tracy/2ffcfc74dd24e77113fb07b3044a3fb2f5c2c325
  rust-overlay:
    url: github:oxalica/rust-overlay
    inputs:
      nixpkgs:
        follows: nixpkgs
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
allowUnfree: true # steam-run
