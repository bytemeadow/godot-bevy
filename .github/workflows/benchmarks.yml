name: benchmarks

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "godot-bevy/**"
      - "godot-bevy-macros/**"
      - "itest/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/benchmarks.yml"
      - ".github/scripts/benchmarks-compare.py"
      - ".github/scripts/benchmarks-merge.py"
      - ".github/scripts/benchmarks-assert-names.py"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  GODOT_VERSION: "4.6.2"
  GDENV_VERSION: "0.2.2"
  # Shared target dir so baseline (worktree) and PR builds share cache and avoid double compile time
  CARGO_TARGET_DIR: ${{ github.workspace }}/target

permissions:
  contents: read

jobs:
  benchmarks:
    runs-on: ${{ github.event_name == 'workflow_dispatch' && 'ubuntu-latest' || 'blaze/compute/ubuntu-latest-amd64' }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install Linux dependencies
        run: |
          sudo apt-get update || true
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config

      - name: Setup Godot
        uses: bytemeadow/gdenv@v0.2.2
        with:
          version: ${{ env.GODOT_VERSION }}
          gdenv-version: ${{ env.GDENV_VERSION }}
          use-dotnet: false
          include-templates: false
          cache: true

      # ── Benchmark comparison (interleaved base vs PR, noise-gated) ───
      # Delegates to itest/compare-benches.sh — the same script used locally — so
      # CI and local results can't drift. It builds the base branch (with this
      # PR's benchmarks.rs, falling back to the base's own if that doesn't
      # compile) and the PR branch, runs them interleaved so runner load hits
      # both sides equally, and writes a noise-gated comparison.json.

      - name: Run benchmark comparison
        if: github.event_name == 'pull_request'
        working-directory: itest
        env:
          GODOT4_BIN: godot
          BENCH_ROUNDS: "3"
        run: ./compare-benches.sh "${{ github.event.pull_request.base.sha }}"

      - name: Run benchmarks (manual dispatch, no comparison)
        if: github.event_name == 'workflow_dispatch'
        working-directory: itest
        env:
          GODOT4_BIN: godot
        run: ./run-benches.sh

      - name: Save PR context
        if: github.event_name == 'pull_request'
        run: |
          cp itest/.bench-results/comparison.json itest/comparison.json
          echo "${{ github.event.pull_request.number }}" > itest/pr_number.txt

      - name: Upload benchmark artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            itest/comparison.json
            itest/pr_number.txt
